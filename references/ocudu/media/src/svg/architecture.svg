<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" style="width: 100%; max-width: 1400px; height: auto;">
                <!-- Background container -->
                <rect x="20" y="20" width="1360" height="860" fill="#f5f5f5" stroke="none"></rect>

                <!-- SMO (left side) -->
                <rect x="40" y="60" width="120" height="400" fill="#bdbdbd" stroke="#757575" stroke-width="2" rx="5"></rect>
                <text x="100" y="270" text-anchor="middle" font-size="18" font-weight="bold" fill="#424242" transform="rotate(-90 100 270)">SMO</text>

                <!-- non-RT-RIC -->
                <rect x="40" y="480" width="120" height="200" fill="#bdbdbd" stroke="#757575" stroke-width="2" rx="5"></rect>
                <text x="100" y="590" text-anchor="middle" font-size="14" font-weight="bold" fill="#424242" transform="rotate(-90 100 590)">non-RT-RIC</text>

                <!-- near-RT-RIC -->
                <rect x="180" y="150" width="120" height="400" fill="#bdbdbd" stroke="#757575" stroke-width="2" rx="5"></rect>
                <text x="240" y="360" text-anchor="middle" font-size="14" font-weight="bold" fill="#424242" transform="rotate(-90 240 360)">near-RT-RIC</text>

                <!-- O1 Interface (dashed) -->
                <line x1="160" y1="120" x2="380" y2="120" stroke="#666" stroke-width="2" stroke-dasharray="8,4"></line>
                <text x="270" y="110" text-anchor="middle" font-size="11" font-weight="bold" fill="#666">O1</text>

                <!-- A1 Interface (dashed) -->
                <line x1="160" y1="540" x2="180" y2="540" stroke="#666" stroke-width="2" stroke-dasharray="8,4"></line>
                <text x="170" y="530" text-anchor="middle" font-size="11" font-weight="bold" fill="#666">A1</text>

                <!-- E2-cp Interface (dashed) -->
                <line x1="300" y1="220" x2="380" y2="220" stroke="#666" stroke-width="2" stroke-dasharray="8,4"></line>
                <text x="340" y="210" text-anchor="middle" font-size="11" font-weight="bold" fill="#666">E2-cp</text>

                <!-- E2-up Interface (dashed) -->
                <line x1="300" y1="300" x2="700" y2="300" stroke="#666" stroke-width="2" stroke-dasharray="8,4"></line>
                <text x="500" y="290" text-anchor="middle" font-size="11" font-weight="bold" fill="#666">E2-up</text>

                <!-- E2-du Interface (dashed) -->
                <line x1="300" y1="480" x2="380" y2="480" stroke="#666" stroke-width="2" stroke-dasharray="8,4"></line>
                <text x="340" y="470" text-anchor="middle" font-size="11" font-weight="bold" fill="#666">E2-du</text>

                <!-- O-CU-CP -->
                <rect x="380" y="80" width="180" height="180" fill="#4db6ac" stroke="#00796b" stroke-width="2" rx="5"></rect>
                <text x="470" y="105" text-anchor="middle" font-size="14" font-weight="bold" fill="#004d40">O-CU-CP</text>
                <rect x="400" y="120" width="140" height="50" fill="#2196f3" stroke="#1565c0" stroke-width="1" rx="3"></rect>
                <text x="470" y="150" text-anchor="middle" font-size="12" font-weight="bold" fill="white">RRC</text>
                <rect x="400" y="180" width="140" height="50" fill="#2196f3" stroke="#1565c0" stroke-width="1" rx="3"></rect>
                <text x="470" y="210" text-anchor="middle" font-size="12" font-weight="bold" fill="white">PDCP-c</text>

                <!-- O-CU-UP -->
                <rect x="700" y="180" width="180" height="180" fill="#4db6ac" stroke="#00796b" stroke-width="2" rx="5"></rect>
                <text x="790" y="205" text-anchor="middle" font-size="14" font-weight="bold" fill="#004d40">O-CU-UP</text>
                <rect x="720" y="220" width="140" height="50" fill="#2196f3" stroke="#1565c0" stroke-width="1" rx="3"></rect>
                <text x="790" y="250" text-anchor="middle" font-size="12" font-weight="bold" fill="white">SDAP</text>
                <rect x="720" y="280" width="140" height="50" fill="#2196f3" stroke="#1565c0" stroke-width="1" rx="3"></rect>
                <text x="790" y="310" text-anchor="middle" font-size="12" font-weight="bold" fill="white">PDCP-u</text>

                <!-- F1-c Interface -->
                <line x1="470" y1="260" x2="470" y2="420" stroke="#333" stroke-width="3"></line>
                <text x="490" y="340" font-size="11" font-weight="bold" fill="#333">F1-c</text>

                <!-- F1-u Interface -->
                <line x1="790" y1="360" x2="790" y2="420" stroke="#333" stroke-width="3"></line>
                <text x="810" y="390" font-size="11" font-weight="bold" fill="#333">F1-u</text>

                <!-- E1 Interface -->
                <line x1="560" y1="230" x2="700" y2="230" stroke="#333" stroke-width="2"></line>
                <text x="630" y="220" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">E1</text>

                <!-- NG-c, XN-c (right side from CU-CP) -->
                <line x1="560" y1="140" x2="1100" y2="140" stroke="#333" stroke-width="2"></line>
                <text x="1120" y="145" font-size="11" font-weight="bold" fill="#333">NG-c</text>
                <line x1="560" y1="170" x2="1100" y2="170" stroke="#333" stroke-width="2"></line>
                <text x="1120" y="175" font-size="11" font-weight="bold" fill="#333">XN-c</text>

                <!-- NG-u, XN-u (right side from CU-UP) -->
                <line x1="880" y1="250" x2="1100" y2="250" stroke="#333" stroke-width="2"></line>
                <text x="1120" y="255" font-size="11" font-weight="bold" fill="#333">NG-u</text>
                <line x1="880" y1="280" x2="1100" y2="280" stroke="#333" stroke-width="2"></line>
                <text x="1120" y="285" font-size="11" font-weight="bold" fill="#333">XN-u</text>

                <!-- O-gDU-high -->
                <rect x="380" y="420" width="500" height="140" fill="#4db6ac" stroke="#00796b" stroke-width="2" rx="5"></rect>
                <text x="630" y="445" text-anchor="middle" font-size="14" font-weight="bold" fill="#004d40">O-gDU-high</text>
                <rect x="420" y="460" width="420" height="40" fill="#2196f3" stroke="#1565c0" stroke-width="1" rx="3"></rect>
                <text x="630" y="485" text-anchor="middle" font-size="12" font-weight="bold" fill="white">RLC</text>
                <rect x="420" y="510" width="420" height="40" fill="#2196f3" stroke="#1565c0" stroke-width="1" rx="3"></rect>
                <text x="630" y="535" text-anchor="middle" font-size="12" font-weight="bold" fill="white">MAC</text>

                <!-- FAPI+ Interface -->
                <line x1="630" y1="560" x2="630" y2="590" stroke="#333" stroke-width="3"></line>
                <text x="650" y="580" font-size="11" font-weight="bold" fill="#333">FAPI+</text>

                <!-- O-gDU-low -->
                <rect x="380" y="590" width="500" height="160" fill="#4db6ac" stroke="#00796b" stroke-width="2" rx="5"></rect>
                <text x="630" y="615" text-anchor="middle" font-size="14" font-weight="bold" fill="#004d40">O-gDU-low</text>
                <rect x="420" y="630" width="420" height="50" fill="#2196f3" stroke="#1565c0" stroke-width="1" rx="3"></rect>
                <text x="630" y="660" text-anchor="middle" font-size="12" font-weight="bold" fill="white">PHY - high</text>
                <rect x="420" y="690" width="420" height="50" fill="#2196f3" stroke="#1565c0" stroke-width="1" rx="3"></rect>
                <text x="630" y="720" text-anchor="middle" font-size="12" font-weight="bold" fill="white">PHY - low</text>

                <!-- FH (7.2) Interface -->
                <line x1="550" y1="750" x2="550" y2="800" stroke="#333" stroke-width="3"></line>
                <text x="520" y="780" font-size="11" font-weight="bold" fill="#333">FH (7.2)</text>

                <!-- FH (8) Interface -->
                <line x1="710" y1="750" x2="710" y2="800" stroke="#333" stroke-width="3"></line>
                <text x="720" y="780" font-size="11" font-weight="bold" fill="#333">FH - (8)</text>

                <!-- O-RU -->
                <rect x="450" y="800" width="200" height="80" fill="#bdbdbd" stroke="#757575" stroke-width="2" rx="5"></rect>
                <text x="550" y="825" text-anchor="middle" font-size="14" font-weight="bold" fill="#424242">O-RU</text>
                <rect x="480" y="840" width="140" height="30" fill="#2196f3" stroke="#1565c0" stroke-width="1" rx="3"></rect>
                <text x="550" y="860" text-anchor="middle" font-size="11" font-weight="bold" fill="white">PHY - low</text>

                <!-- RU -->
                <rect x="680" y="800" width="160" height="80" fill="#bdbdbd" stroke="#757575" stroke-width="2" rx="5"></rect>
                <text x="760" y="850" text-anchor="middle" font-size="16" font-weight="bold" fill="#424242">RU</text>
            </svg>